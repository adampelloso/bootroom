name: Daily Ingest & KV Push

on:
  schedule:
    # Run daily at 6 AM UTC (before European fixtures are published)
    - cron: "0 6 * * *"
  workflow_dispatch: # Manual trigger

concurrency:
  group: daily-ingest
  cancel-in-progress: false

env:
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
  API_FOOTBALL_HOST: ${{ secrets.API_FOOTBALL_HOST }}
  API_FOOTBALL_BASE_URL: ${{ secrets.API_FOOTBALL_BASE_URL }}
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Derive base season and odds window
        id: vars
        shell: bash
        run: |
          # European base season start year: Jul-Dec => current year, Jan-Jun => previous year
          MONTH="$(date -u +%m)"
          YEAR="$(date -u +%Y)"
          if [ "$MONTH" -ge 7 ]; then
            BASE_SEASON="$YEAR"
          else
            BASE_SEASON="$((YEAR - 1))"
          fi
          TODAY_UTC="$(date -u +%Y-%m-%d)"
          ODDS_TO="$(date -u -d '+7 day' +%Y-%m-%d)"
          echo "base_season=$BASE_SEASON" >> "$GITHUB_OUTPUT"
          echo "today_utc=$TODAY_UTC" >> "$GITHUB_OUTPUT"
          echo "odds_to=$ODDS_TO" >> "$GITHUB_OUTPUT"

      # ── Fast DB sync (1 API call per league → scores in DB) ──

      - name: Sync all fixture results to DB (lightweight)
        run: npx tsx scripts/sync-fixtures-api-to-db.ts --season=${{ steps.vars.outputs.base_season }}

      # ── Cache data directory for incremental ingestion ──
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ingest-data-${{ github.run_id }}
          restore-keys: |
            ingest-data-

      # ── Detailed Data Ingest (stats, players) ───────────────

      - name: Ingest season fixtures (incremental)
        run: node scripts/season-ingest.mjs --all --season=${{ steps.vars.outputs.base_season }}

      - name: Ingest player stats (skip if fresh)
        run: node scripts/ingest-players.mjs --all --season=${{ steps.vars.outputs.base_season }} --skip-if-fresh

      - name: Ingest upcoming fixtures (7-day window)
        run: node scripts/ingest-upcoming-fixtures.mjs --season=${{ steps.vars.outputs.base_season }} --days=7

      - name: Sync fixtures & teams to Turso DB
        run: npx tsx scripts/sync-fixtures-to-db.ts

      - name: Ingest team metadata to Turso DB
        run: npx tsx scripts/ingest-teams-db.ts

      - name: Ingest odds to Turso DB
        shell: bash
        run: |
          for pass in 1 2 3; do
            echo "Odds ingest pass ${pass}/3"
            npx tsx scripts/ingest-odds-db.ts \
              --statuses=NS \
              --date-from=${{ steps.vars.outputs.today_utc }} \
              --date-to=${{ steps.vars.outputs.odds_to }} \
              --missing-only=true \
              --batch-size=12 \
              --delay-ms=500
          done

      - name: Ingest H2H to Turso DB
        run: npx tsx scripts/ingest-h2h-db.ts

      - name: Sync per-match lineups to Turso DB
        run: npx tsx scripts/sync-lineups-to-db.ts

      - name: Ingest injuries to Turso DB
        run: npx tsx scripts/ingest-injuries-db.ts

      # ── Simulations ──────────────────────────────────────

      - name: Run Monte Carlo simulations
        run: npx tsx scripts/run-simulations.ts

      - name: Pipeline QA gate (fixtures, sims, odds coverage)
        run: node scripts/qa-pipeline-gate.mjs

      # ── Pre-build & KV Push ──────────────────────────────

      - name: Pre-build team stats + KV staging
        run: node scripts/prebuild-stats.mjs

      - name: Push to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: node scripts/push-to-kv.mjs

      # ── Cleanup ──────────────────────────────────────────

      - name: Summary
        run: |
          echo "## Ingest Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Fixture files: $(ls data/*-fixtures.json 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- KV staging files: $(ls data/kv-staging/*.json 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Simulation files: $(ls data/simulations/*.json 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
