name: Intraday Odds & Sims Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: intraday-refresh
  cancel-in-progress: true

env:
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
  API_FOOTBALL_HOST: ${{ secrets.API_FOOTBALL_HOST }}
  API_FOOTBALL_BASE_URL: ${{ secrets.API_FOOTBALL_BASE_URL }}
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Derive base season and odds window
        id: vars
        shell: bash
        run: |
          MONTH="$(date -u +%m)"
          YEAR="$(date -u +%Y)"
          if [ "$MONTH" -ge 7 ]; then
            BASE_SEASON="$YEAR"
          else
            BASE_SEASON="$((YEAR - 1))"
          fi
          TODAY_UTC="$(date -u +%Y-%m-%d)"
          ODDS_TO="$(date -u -d '+7 day' +%Y-%m-%d)"
          echo "base_season=$BASE_SEASON" >> "$GITHUB_OUTPUT"
          echo "today_utc=$TODAY_UTC" >> "$GITHUB_OUTPUT"
          echo "odds_to=$ODDS_TO" >> "$GITHUB_OUTPUT"

      - name: Sync fixture statuses to DB (lightweight)
        run: npx tsx scripts/sync-fixtures-api-to-db.ts --season=${{ steps.vars.outputs.base_season }}

      - name: Refresh upcoming fixtures (7-day window)
        run: node scripts/ingest-upcoming-fixtures.mjs --season=${{ steps.vars.outputs.base_season }} --days=7 --delay=200

      - name: Sync upcoming fixtures to DB
        run: npx tsx scripts/sync-fixtures-to-db.ts

      - name: Refresh odds (windowed retries)
        shell: bash
        run: |
          for pass in 1 2; do
            echo "Odds refresh pass ${pass}/2"
            npx tsx scripts/ingest-odds-db.ts \
              --statuses=NS \
              --date-from=${{ steps.vars.outputs.today_utc }} \
              --date-to=${{ steps.vars.outputs.odds_to }} \
              --missing-only=true \
              --batch-size=12 \
              --delay-ms=400
          done

      - name: Refresh simulations
        run: npx tsx scripts/run-simulations.ts

      - name: Pipeline QA gate
        run: node scripts/qa-pipeline-gate.mjs

      - name: Pre-build team stats + KV staging
        run: node scripts/prebuild-stats.mjs

      - name: Push to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: node scripts/push-to-kv.mjs
